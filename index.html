<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}</style>
<title>Internal Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow-x:hidden}
body{background:#070710;color:#ece9ff;font-family:'Manrope',sans-serif}

nav{display:none}

.hero{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:24px 24px 48px;overflow:hidden;
}

/* premium animated background — soft moving light */
.hero-bg{
  position:absolute;inset:0;z-index:0;overflow:hidden;
}
.hero-bg canvas{position:absolute;inset:0;z-index:1;opacity:.2}
.orb-main{
  position:absolute;
  width:700px;height:700px;
  left:50%;top:50%;
  transform:translate(-50%,-52%);
  background:radial-gradient(circle at center,rgba(255,255,255,.14) 0%,rgba(210,195,255,.09) 22%,rgba(150,110,255,.04) 48%,transparent 68%);
  border-radius:50%;
  animation:orb-drift 10s ease-in-out infinite;
  pointer-events:none;z-index:2;
}
.orb-left{
  position:absolute;
  width:420px;height:420px;
  left:2%;top:20%;
  background:radial-gradient(circle,rgba(170,130,255,.12) 0%,rgba(130,90,255,.05) 40%,transparent 68%);
  border-radius:50%;
  animation:orb-left 13s ease-in-out infinite;
  pointer-events:none;z-index:2;
}
.orb-right{
  position:absolute;
  width:380px;height:380px;
  right:1%;top:30%;
  background:radial-gradient(circle,rgba(210,185,255,.1) 0%,rgba(170,130,255,.05) 40%,transparent 68%);
  border-radius:50%;
  animation:orb-right 11s ease-in-out infinite;
  pointer-events:none;z-index:2;
}
.beam{
  position:absolute;
  left:-10%;top:46%;
  transform:translateY(-50%);
  width:120%;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.05) 15%,rgba(255,255,255,.28) 38%,rgba(240,230,255,.4) 50%,rgba(255,255,255,.28) 62%,rgba(255,255,255,.05) 85%,transparent 100%);
  z-index:3;
  animation:beam-move 6s ease-in-out infinite;
  pointer-events:none;
}
.beam::before{
  content:'';position:absolute;
  left:0;right:0;top:-50px;height:100px;
  background:linear-gradient(90deg,transparent,rgba(230,220,255,.11) 30%,rgba(255,255,255,.18) 50%,rgba(230,220,255,.11) 70%,transparent);
  filter:blur(22px);
}
.beam::after{
  content:'';position:absolute;
  left:20%;right:20%;top:-1px;height:4px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35) 50%,transparent);
  filter:blur(2px);
}
@keyframes beam-move{
  0%{transform:translateY(-50%) translateX(-8%);opacity:.5}
  50%{transform:translateY(-50%) translateX(8%);opacity:1}
  100%{transform:translateY(-50%) translateX(-8%);opacity:.5}
}
@keyframes orb-drift{
  0%,100%{transform:translate(-50%,-52%) scale(1);opacity:.85}
  33%{transform:translate(-50%,-57%) scale(1.08);opacity:1}
  66%{transform:translate(-50%,-47%) scale(.95);opacity:.9}
}
@keyframes orb-left{
  0%,100%{transform:translate(0,0) scale(1);opacity:.7}
  50%{transform:translate(28px,-40px) scale(1.14);opacity:1}
}
@keyframes orb-right{
  0%,100%{transform:translate(0,0) scale(1);opacity:.65}
  50%{transform:translate(-20px,26px) scale(.86);opacity:1}
}

canvas#dots{position:absolute;inset:0;z-index:1;opacity:.2}
.hero-content{position:relative;z-index:5;width:100%;max-width:680px}

.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(180,160,255,.5);margin-bottom:16px;
  opacity:0;animation:up .6s .05s ease forwards;
}
.edot{width:5px;height:5px;border-radius:50%;background:#9b7fff;animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

h1{
  font-family:'Manrope',sans-serif;
  font-size:32px !important;
  font-weight:700;
  line-height:1.3;
  letter-spacing:-.02em;
  color:#ece9ff;
  margin-bottom:18px;
  opacity:0;
  animation:up .8s .15s ease forwards;
  white-space:normal;
  max-width:100%;
}
h1 .line2{
  display:block;
  font-size:38px !important;
}
h1 .dim{color:rgba(236,233,255,.28);font-weight:300}
h1 .lit{
  background:linear-gradient(90deg,#a78bff 0%,#c4b0ff 50%,#a78bff 100%);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 4s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{background-position:0%}50%{background-position:100%}}

.sub{
  font-size:14px;font-weight:300;color:rgba(236,233,255,.32);line-height:1.8;
  max-width:380px;margin:0 auto 32px;
  opacity:0;animation:up .7s .28s ease forwards;
}
.sub b{color:rgba(236,233,255,.68);font-weight:600}

.video-box{
  width:100%;max-width:560px;margin:0 auto 28px;
  position:relative;aspect-ratio:16/9;border-radius:10px;overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 0 0 1px rgba(255,255,255,.04), 0 0 40px rgba(255,255,255,.06), 0 0 80px rgba(200,190,255,.05), 0 20px 60px rgba(0,0,0,.55);
  cursor:pointer;
  opacity:0;animation:up .8s .38s ease forwards;
}
.vbg{
  position:absolute;inset:0;background:#0c0b18;
  display:flex;align-items:center;justify-content:center;
}
.vbg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 50% at 50% 50%,rgba(100,70,255,.07) 0%,transparent 70%);
}
.vlines{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.009) 3px,rgba(255,255,255,.009) 4px);
}
.play{
  position:relative;z-index:2;
  width:54px;height:54px;border-radius:50%;
  border:1.5px solid rgba(200,185,255,.25);
  background:rgba(100,70,255,.1);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,background .2s;backdrop-filter:blur(6px);
}
.video-box:hover .play{transform:scale(1.1);background:rgba(120,90,255,.2)}
.play svg{fill:#ece9ff;margin-left:4px}
.vlabel{
  position:absolute;bottom:13px;left:0;right:0;text-align:center;z-index:2;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(236,233,255,.26);
}

.cta-row{
  display:flex;flex-direction:column;align-items:center;gap:11px;
  opacity:0;animation:up .7s .5s ease forwards;
}
.signin-link{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;
  color:rgba(236,233,255,.42);text-decoration:none;
  border-bottom:1px solid rgba(236,233,255,.2);
  padding-bottom:2px;
  transition:color .2s,border-color .2s;
  margin-top:4px;
}
.signin-link:hover{color:rgba(236,233,255,.75);border-color:rgba(236,233,255,.45)}
.btn{
  display:inline-block;font-family:'Manrope',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;
  padding:18px 52px;border-radius:4px;
  background:#ece9ff;color:#07070f;text-decoration:none;
  width:100%;max-width:380px;text-align:center;
  transition:transform .2s,box-shadow .2s,background .2s;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);
  transform:translateX(-100%);transition:transform .5s ease;
}
.btn:hover::before{transform:translateX(100%)}
.btn:hover{transform:translateY(-3px);box-shadow:0 0 48px rgba(200,185,255,.25),0 8px 24px rgba(0,0,0,.3);background:#fff}
.price{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:rgba(236,233,255,.18)}

.scroll-cue{
  position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:5;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  opacity:0;animation:up .6s .95s ease forwards;
}
.scroll-line{width:1px;height:32px;background:linear-gradient(180deg,rgba(200,185,255,.2),transparent);animation:sp 2.2s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.35}50%{opacity:1}}
.scroll-txt{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(236,233,255,.16)}

/* TICKER */
.ticker{overflow:hidden;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04);padding:12px 0;background:rgba(255,255,255,.01)}
.t-track{display:flex;width:max-content;animation:tkr 32s linear infinite}
@keyframes tkr{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t-item{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(236,233,255,.12);white-space:nowrap;padding:0 30px;display:flex;align-items:center}
.t-item::after{content:'·';margin-left:30px;color:rgba(236,233,255,.08)}

/* SECTIONS */
.dline{height:1px;background:linear-gradient(90deg,transparent,rgba(180,160,255,.07),transparent)}
.s-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(180,160,255,.35);margin-bottom:18px}
.s-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(46px,7vw,78px);line-height:.9;color:#ece9ff}

/* WHAT */
.what-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;padding:110px 44px;max-width:1080px;margin:0 auto}
.what-desc{font-size:14px;font-weight:300;color:rgba(236,233,255,.3);line-height:1.88;max-width:380px;margin-top:22px}
.what-desc b{color:rgba(236,233,255,.68);font-weight:600}

/* phone */
.phone{margin:0 auto;width:196px;background:#0d0b1c;border:1px solid rgba(180,160,255,.1);border-radius:28px;padding:12px 10px;box-shadow:0 36px 72px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04)}
.phone-notch{width:50px;height:5px;background:#18162a;border-radius:4px;margin:0 auto 10px}
.phone-screen{background:#09081a;border-radius:18px;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
.ps-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(236,233,255,.2)}
.ps-h{font-size:14px;font-weight:800;color:#ece9ff;margin-bottom:4px}
.ps-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px}
.ps-cv{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#ece9ff;line-height:1}
.ps-cs{font-size:9px;color:rgba(236,233,255,.28);margin-top:2px}
.ps-row{display:flex;gap:6px}
.ps-m{flex:1;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:7px;padding:8px}
.ps-ml{font-size:7px;font-family:'DM Mono',monospace;color:rgba(236,233,255,.2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.ps-mv{font-family:'Bebas Neue',sans-serif;font-size:15px;color:#ece9ff}
.ps-dl{height:1px;background:rgba(255,255,255,.04);margin:2px 0}
.ps-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.ps-in{font-size:10px;color:rgba(236,233,255,.35)}
.ps-it{font-family:'DM Mono',monospace;font-size:8px;color:#a78bff;border:1px solid rgba(167,139,255,.2);padding:2px 7px;border-radius:20px}
.ps-it.d{color:rgba(236,233,255,.18);border-color:rgba(255,255,255,.06)}

/* STATS */
.stats-wrap{padding:0 44px 110px;max-width:1080px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(180,160,255,.05);border:1px solid rgba(180,160,255,.05);border-radius:4px;overflow:hidden}
.stat{padding:44px 36px;background:#070710;transition:background .3s}
.stat:hover{background:rgba(100,70,255,.035)}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1;color:#ece9ff;margin-bottom:8px}
.stat-n span{color:#a78bff}
.stat-l{font-size:12px;font-weight:300;color:rgba(236,233,255,.26);line-height:1.65}

/* STEPS */
.steps-wrap{padding:0 44px 110px;max-width:1080px;margin:0 auto}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:44px}
.step{padding:36px 28px;border:1px solid rgba(180,160,255,.06);border-radius:4px;position:relative;overflow:hidden;transition:border-color .3s}
.step:hover{border-color:rgba(180,160,255,.16)}
.step-n{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;color:rgba(180,160,255,.25);margin-bottom:18px}
.step-h{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#ece9ff;margin-bottom:10px}
.step-d{font-size:13px;font-weight:300;color:rgba(236,233,255,.28);line-height:1.72}

/* RESULTS */
.results-wrap{padding:0 44px 110px;max-width:1080px;margin:0 auto}
.results-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px}
.results-note{font-size:12px;color:rgba(236,233,255,.22);max-width:180px;text-align:right;font-weight:300;line-height:1.7}
.results-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.rc{
  background:#0c0a1a;border:1px solid rgba(180,160,255,.08);border-radius:12px;
  padding:32px 28px;
  display:flex;flex-direction:column;gap:20px;
  transition:border-color .3s,transform .3s;
}
.rc:hover{border-color:rgba(180,160,255,.2);transform:translateY(-4px)}
.rc-top{display:flex;align-items:center;gap:14px}
.rc-avatar{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(140,110,255,.3),rgba(100,70,220,.2));
  border:1px solid rgba(167,139,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;
  color:rgba(200,185,255,.7);
}
.rc-meta{}
.rc-name{font-size:13px;font-weight:600;color:rgba(236,233,255,.75);margin-bottom:2px}
.rc-role{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(236,233,255,.22)}
.rc-amount{
  font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;
  color:#a78bff;letter-spacing:.01em;
}
.rc-amount-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(236,233,255,.24);margin-top:2px}
.rc-quote{font-size:13px;font-weight:300;color:rgba(236,233,255,.32);line-height:1.72;font-style:italic}
.rc-divider{height:1px;background:rgba(180,160,255,.07)}
.rc-stat{display:flex;justify-content:space-between;align-items:center}
.rc-stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(236,233,255,.2)}
.rc-stat-val{font-size:12px;font-weight:600;color:rgba(236,233,255,.55)}

/* FINAL CTA */
.cta-final{padding:120px 44px;text-align:center;border-top:1px solid rgba(180,160,255,.05);position:relative;overflow:hidden}
.cta-final::before{content:'';position:absolute;width:600px;height:600px;left:50%;top:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(100,70,255,.06) 0%,transparent 65%);border-radius:50%;pointer-events:none}
.cf-h{font-family:'Bebas Neue',sans-serif;font-size:clamp(58px,10vw,104px);line-height:.9;color:#ece9ff;margin-bottom:16px}
.cf-h em{color:#a78bff;font-style:normal}
.cf-sub{font-size:14px;font-weight:300;color:rgba(236,233,255,.26);line-height:1.8;margin-bottom:44px}
.cta-block{display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;z-index:2}
.btn-lg{display:inline-block;font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:19px 64px;border-radius:2px;background:#ece9ff;color:#07070f;text-decoration:none;transition:transform .2s,box-shadow .2s}
.btn-lg:hover{transform:translateY(-3px);box-shadow:0 0 60px rgba(160,130,255,.2)}
.cf-note{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;color:rgba(236,233,255,.15)}

footer{padding:26px 44px;border-top:1px solid rgba(255,255,255,.03);display:flex;justify-content:space-between;align-items:center}
.fl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(236,233,255,.13)}

/* REVEAL */
.r{opacity:0;transform:translateY(26px);transition:opacity .75s ease,transform .75s ease}
.rl{opacity:0;transform:translateX(-26px);transition:opacity .75s ease,transform .75s ease}
.rr{opacity:0;transform:translateX(26px);transition:opacity .75s ease,transform .75s ease}
.r.on,.rl.on,.rr.on{opacity:1;transform:none}
.d1{transition-delay:.08s}.d2{transition-delay:.18s}.d3{transition-delay:.3s}

@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

@media(max-width:760px){
  nav,.nav{padding:18px 20px}
  nav.solid{padding:14px 20px}
  h1{font-size:clamp(60px,17vw,90px)}
  .video-box{max-width:100%}
  .what-grid{grid-template-columns:1fr;gap:44px;padding:80px 22px}
  .stats-grid,.steps-grid,.results-cards{grid-template-columns:1fr}
  .stats-wrap,.steps-wrap,.results-wrap{padding-left:22px;padding-right:22px}
  .results-hdr{flex-direction:column;gap:12px;align-items:flex-start}
  .results-note{text-align:left;max-width:none}
  .cta-final{padding:80px 22px}
  footer{flex-direction:column;gap:10px;text-align:center;padding:20px}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg">
    <canvas id="dots"></canvas>
    <div class="orb-main"></div>
    <div class="orb-left"></div>
    <div class="orb-right"></div>
    <div class="beam"></div>
  </div>
  <div class="hero-content">
    <div class="eyebrow"><span class="edot"></span>Nobody else teaches this</div>
    <h1>Websites Are Saturated.<br><span class="lit line2">Systems Aren't.</span></h1>
    <p class="sub">Companies <b>desperately need</b> internal systems. Almost nobody knows how to sell them. This is that course.</p>
    <div class="video-box" id="vbox">
      <div class="vbg">
        <div class="vlines"></div>
        <div class="play"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="vlabel">Watch the overview — 5 min</div>
      </div>
    </div>
    <div class="cta-row">
      <a href="#cta" class="btn">Get Instant Access →</a>
      <span class="price">Full access · $750 · one-time payment</span>
      <a href="#" class="signin-link">Already enrolled? Sign in</a>
    </div>
  </div>

</div>

</div>

<script>
const cv=document.getElementById('dots'),cx=cv.getContext('2d');
let W,H,pts=[],T=0;
function sz(){
  const hero=cv.parentElement.parentElement;
  W=cv.width=hero.offsetWidth;H=cv.height=hero.offsetHeight;pts=[];
  for(let x=0;x<W+44;x+=44)for(let y=0;y<H+44;y+=44)
    pts.push({ox:x,oy:y,x,y,ph:Math.random()*Math.PI*2});
}
function df(){
  cx.clearRect(0,0,W,H);T+=.008;
  pts.forEach(p=>{
    p.x=p.ox+Math.sin(T*.5+p.ph)*3.5;
    p.y=p.oy+Math.cos(T*.42+p.ph)*3.5;
    cx.beginPath();cx.arc(p.x,p.y,1,0,Math.PI*2);
    cx.fillStyle=`rgba(167,139,255,${.06+.05*Math.abs(Math.sin(p.ph+T*.3))})`;cx.fill();
  });
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<56){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle=`rgba(140,110,255,${.02*(1-d/56)})`;cx.lineWidth=.5;cx.stroke()}
  }
  requestAnimationFrame(df);
}
sz();window.addEventListener('resize',sz);df();

document.getElementById('vbox').addEventListener('click',function(){
  this.innerHTML=`<iframe width="100%" height="100%" src="https://www.youtube.com/embed/?autoplay=1" style="position:absolute;inset:0;border:none;border-radius:10px" allow="autoplay;fullscreen"></iframe>`;
});
</script>
